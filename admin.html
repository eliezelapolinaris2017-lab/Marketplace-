<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Admin</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body>
  <div class="app-shell admin-shell">
    <header class="topbar glass">
      <div>
        <p class="eyebrow">Panel privado</p>
        <h1>Admin catálogo</h1>
      </div>
      <button id="logoutBtn" class="icon-btn">Salir</button>
    </header>

    <main class="page admin-layout">
      <section class="glass panel auth-panel" id="authPanel">
        <h2>Login Firebase</h2>
        <form id="loginForm" class="form-grid">
          <input type="email" name="email" placeholder="Email admin" required />
          <input type="password" name="password" placeholder="Password" required />
          <button class="primary-btn" type="submit">Entrar</button>
        </form>
      </section>

      <section class="glass panel hidden" id="adminPanel">
        <div class="panel-head">
          <h2>Tienda</h2>
          <span id="authStateBadge" class="badge success">Conectado</span>
        </div>

        <form id="settingsForm" class="form-grid">
          <input name="storeName" placeholder="Nombre del negocio" required />
          <input name="whatsapp" placeholder="WhatsApp" />
          <input name="accentColor" placeholder="#7C3AED" />
          <button class="primary-btn" type="submit">Guardar ajustes</button>
        </form>
      </section>

      <section class="glass panel hidden" id="productPanel">
        <div class="panel-head">
          <h2>Productos</h2>
          <span class="badge">Alta rápida</span>
        </div>

        <form id="productForm" class="form-grid two-col">
          <input name="name" placeholder="Nombre del producto" required />
          <input name="price" type="number" step="0.01" placeholder="Precio" required />
          <input name="categorySlug" placeholder="Categoría / slug" required />
          <input name="payLink" placeholder="Paylink por artículo" />
          <input name="imageUrl" placeholder="URL de imagen" />
          <textarea name="description" placeholder="Descripción"></textarea>
          <label class="switch-row"><input name="active" type="checkbox" checked /> Activo</label>
          <button class="primary-btn" type="submit">Guardar producto</button>
        </form>

        <div id="adminProductList" class="admin-product-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
